<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counselor</title>
    <!-- google map api -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBgqgTJqEeYfMAT96miDD5YWqNiK8KUPNM&callback=initMap&libraries=&v=weekly"
      defer
    ></script>
    <!-- local js -->
    <script defer src="assets/content.js"></script>
    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.1/css/all.css"
      integrity="sha384-vp86vTRFVJgpjF9jiIGPEEqYqlDwgyBgEF109VFjmqGmIY/Y4HV4d3Gp2irVfcrp"
      crossorigin="anonymous"
    />
    <!-- custome css styles -->
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body onload="initMap()">
    <header class="container main-section main-section-margin wrap-header">
      <div class="header-inner">
        <div class="header-logo">LOGO</div>
        <div class="header-fb header-item">
          <i class="fab fa-facebook-f"></i>
        </div>
        <div class="header-location header-item">
          <i class="fas fa-map-marker-alt"></i>
        </div>
        <div class="header-phone header-item">
          <i class="fas fa-phone-alt"></i
          ><span class="header-phone-number">218-590-6753</span>
        </div>
      </div>
    </header>

    <section class="container main-section main-section-margin wrap-hero">
      <div class="hero-inner">
        <img
          src="./assets/superior_light_house.jpg"
          alt=""
          class="hero-img container"
        />

        <h1 class="hero">5 Stones Trail Counseling</h1>
      </div>
    </section>

    <section class="container main-section main-section-margin wrap-content">
      <div class="content-inner">
        <h3 id="content-heading" class="content-heading"></h3>
        <p id="content-text" class="content-text"></p>
      </div>

      <div class="services-inner">
        <div id="1" class="service-card">
          <h4 class="service-heading">Church</h4>
          <div class="service-text">Church</div>
        </div>
        <div id="2" class="service-card">
          <h4 class="service-heading">service 2</h4>
          <div class="service-text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
          </div>
        </div>
        <div id="3" class="service-card">
          <h4 class="service-heading">service 3</h4>
          <div class="service-text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit.
          </div>
        </div>
      </div>
    </section>

    <footer class="container main-section main-section-margin wrap-footer">
      <div class="footer-inner">
        <div class="map" id="map"></div>
        <div class="footer-sub">
          <div class="footer-sub-item">
            <div class="footer-phone">
              <h5>Schedule appointment</h5>
              <span>218-590-6753</span>
            </div>
          </div>
          <div class="footer-sub-item">
            Find us on Social Media <i class="fab fa-facebook"></i>
          </div>
        </div>
      </div>
    </footer>
    <!-- Handle google map -->
    <script>
      // Initialize and add the map
      function initMap() {
        // The location of superior
        const superior = { lat: 46.7208, lng: -92.1041 };
        // The map, centered at superior
        const map = new google.maps.Map(document.getElementById('map'), {
          zoom: 14,
          center: superior,
        });
        // The marker, positioned at superior
        const marker = new google.maps.Marker({
          position: superior,
          map: map,
        });
      }
    </script>
  </body>
</html>
